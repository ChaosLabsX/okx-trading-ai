name: Crypto Signal Checker

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes — script loops internally every 60 s
  workflow_dispatch:          # allows manual trigger from GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 6        # safety cap — script self-exits after 4 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore signal state (deduplication cache)
        uses: actions/cache/restore@v4
        with:
          path: signal_cache.json
          key: signal-cache-${{ runner.os }}
          restore-keys: |
            signal-cache-

      - name: Run signal checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional: comma-separated symbols you hold — limits SELL alerts to those coins.
          # Set as a GitHub Secret named PORTFOLIO_SYMBOLS, e.g. "BTC-USDT,ETH-USDT"
          # Leave unset to receive SELL alerts for all scanned coins.
          PORTFOLIO_SYMBOLS:  ${{ secrets.PORTFOLIO_SYMBOLS }}
        run: python signal_checker.py

      - name: Save signal state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: signal_cache.json
          key: signal-cache-${{ runner.os }}-${{ github.run_id }}
