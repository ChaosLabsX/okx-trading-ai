name: Crypto Signal Checker

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (backup — GitHub cron can be delayed)
  workflow_dispatch:          # allows manual trigger from GitHub
  repository_dispatch:        # allows external trigger via GitHub API (used by cron-job.org)
    types: [run-signal-checker]

# Only one run at a time — prevents duplicate Telegram alerts if two triggers fire close together.
concurrency:
  group: signal-checker
  cancel-in-progress: false   # queue the new run rather than cancelling the active one

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 6        # safety cap — script self-exits after 4 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore signal state (deduplication cache)
        uses: actions/cache/restore@v4
        with:
          path: signal_cache.json
          key: signal-cache-${{ runner.os }}
          restore-keys: |
            signal-cache-

      - name: Run signal checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          # OKX credentials — required for Option 3 break-even SL monitor.
          # Add these as GitHub Secrets: OKX_API_KEY, OKX_SECRET_KEY, OKX_PASSPHRASE
          OKX_API_KEY:        ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY:     ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE:     ${{ secrets.OKX_PASSPHRASE }}
          # Claude Opus 4.8 — AI trade advisor for auto-trade sizing and parameters
          # (signal_checker.py uses claude-opus-4-8; the "Haiku" here was stale).
          # Add CLAUDE_API_KEY as a GitHub Secret (your Anthropic API key).
          # Auto-trade is silently skipped if this secret is not set.
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
          # Supabase — trade persistence and monitoring.
          # Get these from: Supabase dashboard → Settings → API
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
        run: python signal_checker.py

      - name: Save signal state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: signal_cache.json
          key: signal-cache-${{ runner.os }}-${{ github.run_id }}
